<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services — AquaShine</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<div id="app-root"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
const root = App.shell({ role: 'customer', active: 'services', title: 'Services' });
const services = DB.services();
const cats = ['All', ...new Set(services.map(s => s.category))];
let activeCat = 'All';

function render() {
  const list = activeCat === 'All' ? services : services.filter(s => s.category === activeCat);
  root.innerHTML = `
    <div class="page-head">
      <h1>Our Services</h1>
      <p>Choose from our range of professional car wash and detailing services.</p>
    </div>
    <div class="toolbar mb-3">
      ${cats.map(c => `<button class="btn ${c === activeCat ? '' : 'btn-outline'} btn-sm" onclick="setCat('${c}')">${c}</button>`).join('')}
    </div>
    <div class="svc-grid">
      ${list.map(s => `
        <div class="card svc-card card-hover">
          <div class="svc-thumb">${s.icon}${s.popular ? '<span class="badge badge-info pop">Popular</span>' : ''}</div>
          <div class="svc-body">
            <span class="svc-cat">${s.category}</span>
            <h3>${s.name}</h3>
            <p class="svc-desc">${s.desc}</p>
            <div class="svc-meta">
              <div class="svc-price">${App.money(s.price)}</div>
              <div class="svc-dur">⏱️ ${s.duration} min</div>
            </div>
            <div class="row" style="gap:8px;">
              <a href="service-details.html?id=${s.id}" class="btn btn-outline grow">Details</a>
              <a href="book.html?service=${s.id}" class="btn grow">Book</a>
            </div>
          </div>
        </div>`).join('')}
    </div>`;
}
function setCat(c) { activeCat = c; render(); }
render();
</script>
</body>
</html>
