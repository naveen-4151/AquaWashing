<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — AquaShine</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<div id="app-root"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
const root = App.shell({ role: 'admin', active: 'dashboard', title: 'Dashboard' });
const bookings = DB.all().adminBookings;
const customers = DB.all().allCustomers;
const payments = DB.all().adminPayments;
const revenue = payments.filter(p=>p.status==='Success').reduce((s,p)=>s+p.amount,0);
const pendingPay = payments.filter(p=>p.status==='Pending').length;

// weekly revenue mock
const week = [{d:'Mon',v:4200},{d:'Tue',v:6800},{d:'Wed',v:5100},{d:'Thu',v:8300},{d:'Fri',v:9600},{d:'Sat',v:14200},{d:'Sun',v:11500}];
const maxV = Math.max(...week.map(w=>w.v));

// service popularity
const svcPop = [{n:'Foam Wash',v:34,c:'#0ea5e9'},{n:'Full Detailing',v:26,c:'#06b6d4'},{n:'Interior Clean',v:18,c:'#7c3aed'},{n:'Express Wash',v:14,c:'#16a34a'},{n:'Other',v:8,c:'#f59e0b'}];

root.innerHTML = `
  <div class="page-head"><h1>Business Overview</h1><p>Monday, 13 July 2026 · Here's how AquaShine is performing.</p></div>

  <div class="stats-grid mb-3">
    <div class="stat"><div class="st-ic green">💰</div><div class="st-val">${App.money(revenue)}</div><div class="st-label">Revenue (this week)</div><div class="st-trend up">▲ 12.4% vs last week</div></div>
    <div class="stat"><div class="st-ic blue">🗓️</div><div class="st-val">${bookings.length}</div><div class="st-label">Total Bookings</div><div class="st-trend up">▲ 8 today</div></div>
    <div class="stat"><div class="st-ic purple">👥</div><div class="st-val">${customers.length}</div><div class="st-label">Customers</div><div class="st-trend up">▲ 3 new</div></div>
    <div class="stat"><div class="st-ic amber">⏳</div><div class="st-val">${pendingPay}</div><div class="st-label">Pending Payments</div><div class="st-trend down">Needs attention</div></div>
  </div>

  <div class="grid-2 mb-3">
    <div class="card card-pad">
      <div class="section-head"><h2>Weekly revenue</h2><span class="badge badge-success">▲ 12.4%</span></div>
      <div class="chart">
        ${week.map(w => `<div class="col"><div class="c-val">${(w.v/1000).toFixed(1)}k</div><div class="bar" style="height:${(w.v/maxV*100)}%"></div><div class="c-label">${w.d}</div></div>`).join('')}
      </div>
    </div>
    <div class="card card-pad">
      <h2 style="font-size:1.15rem;margin-bottom:16px;">Popular services</h2>
      <div class="legend">
        ${svcPop.map(s => `<div class="lg-item"><span class="sw" style="background:${s.c}"></span>${s.n}<span class="lg-val">${s.v}%</span></div>
          <div class="progress" style="margin-bottom:6px;"><div class="bar" style="width:${s.v*2.5}%;background:${s.c}"></div></div>`).join('')}
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-head" style="padding:18px 22px 0;"><h2>Recent bookings</h2><a href="bookings.html" class="btn btn-ghost btn-sm">Manage all →</a></div>
    <div class="table-wrap"><table class="data">
      <thead><tr><th>Booking</th><th>Customer</th><th>Service</th><th>Date</th><th>Amount</th><th>Payment</th><th>Status</th></tr></thead>
      <tbody>${bookings.slice(0,6).map(b => `
        <tr>
          <td class="t-strong">${b.id}</td>
          <td><div class="cell-user"><span class="mini-avatar">${App.initials(b.customer)}</span>${b.customer}</div></td>
          <td>${b.service}</td>
          <td>${App.date(b.date)}<div class="small muted">${b.slot}</div></td>
          <td class="t-strong">${App.money(b.amount)}</td>
          <td>${App.statusBadge(b.payStatus)}</td>
          <td>${App.statusBadge(b.status)}</td>
        </tr>`).join('')}</tbody>
    </table></div>
  </div>`;
</script>
</body>
</html>
