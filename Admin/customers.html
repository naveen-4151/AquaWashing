<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers — Admin — AquaShine</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<div id="app-root"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
const root = App.shell({ role: 'admin', active: 'customers', title: 'Customer Management' });
let query = '';

function render() {
  let list = DB.all().allCustomers;
  if (query) list = list.filter(c => (c.name + c.email + c.phone).toLowerCase().includes(query.toLowerCase()));
  const total = DB.all().allCustomers;
  root.innerHTML = `
    <div class="page-head"><h1>Customer Management</h1><p>View and manage your customer base.</p></div>
    <div class="stats-grid mb-3">
      <div class="stat"><div class="st-ic blue">👥</div><div class="st-val">${total.length}</div><div class="st-label">Total Customers</div></div>
      <div class="stat"><div class="st-ic green">✅</div><div class="st-val">${total.filter(c=>c.status==='Active').length}</div><div class="st-label">Active</div></div>
      <div class="stat"><div class="st-ic purple">👑</div><div class="st-val">${total.filter(c=>c.status==='VIP').length}</div><div class="st-label">VIP</div></div>
      <div class="stat"><div class="st-ic cyan">💰</div><div class="st-val">${App.money(total.reduce((s,c)=>s+c.spent,0))}</div><div class="st-label">Lifetime Value</div></div>
    </div>
    <div class="between mb-3">
      <div class="search-box"><span class="ic">🔍</span><input class="input" placeholder="Search customers…" value="${query}" oninput="search(this.value)"></div>
      <button class="btn" onclick="App.toast('Demo: export to CSV','info')">⬇️ Export</button>
    </div>
    <div class="card"><div class="table-wrap"><table class="data">
      <thead><tr><th>Customer</th><th>Contact</th><th>Bookings</th><th>Total Spent</th><th>Joined</th><th>Status</th><th></th></tr></thead>
      <tbody>${list.map(c => `
        <tr>
          <td><div class="cell-user"><span class="mini-avatar">${App.initials(c.name)}</span><div><div class="t-strong">${c.name}</div><div class="small muted">${c.id}</div></div></div></td>
          <td>${c.email}<div class="small muted">${c.phone}</div></td>
          <td class="t-strong">${c.bookings}</td>
          <td class="t-strong">${App.money(c.spent)}</td>
          <td>${App.date(c.joined)}</td>
          <td>${App.statusBadge(c.status)}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="viewCustomer('${c.id}')">View</button></td>
        </tr>`).join('') || `<tr><td colspan="7"><div class="empty">No customers found.</div></td></tr>`}</tbody>
    </table></div></div>`;
}
function search(v){query=v;render();}

function viewCustomer(id) {
  const c = DB.all().allCustomers.find(x => x.id === id);
  App.modal(`
    <div class="modal-head"><h3>Customer Profile</h3><button class="modal-close" onclick="App.closeModal()">×</button></div>
    <div class="modal-body">
      <div class="text-center mb-3">
        <div class="avatar" style="width:72px;height:72px;font-size:1.6rem;margin:0 auto 10px;">${App.initials(c.name)}</div>
        <h3>${c.name}</h3><p class="muted small">${c.email} · ${c.phone}</p>
        <div class="mt-1">${App.statusBadge(c.status)}</div>
      </div>
      <div class="summary-line"><span class="lbl">Customer ID</span><b>${c.id}</b></div>
      <div class="summary-line"><span class="lbl">Total bookings</span><b>${c.bookings}</b></div>
      <div class="summary-line"><span class="lbl">Total spent</span><b>${App.money(c.spent)}</b></div>
      <div class="summary-line"><span class="lbl">Member since</span><b>${App.date(c.joined)}</b></div>
      <div class="summary-line" style="border:none;"><span class="lbl">Avg. per booking</span><b>${App.money(Math.round(c.spent/c.bookings))}</b></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="App.closeModal()">Close</button>
      <button class="btn btn-outline" onclick="App.toast('Demo: message sent','success')">✉️ Message</button>
    </div>`);
}
render();
</script>
</body>
</html>
