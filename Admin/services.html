<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services — Admin — AquaShine</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<div id="app-root"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
const root = App.shell({ role: 'admin', active: 'services', title: 'Service Management' });

function render() {
  const list = DB.services();
  root.innerHTML = `
    <div class="between mb-3">
      <div class="page-head" style="margin:0;"><h1>Service Management</h1><p>Create and manage the services you offer.</p></div>
      <button class="btn" onclick="editService()">+ Add service</button>
    </div>
    <div class="card"><div class="table-wrap"><table class="data">
      <thead><tr><th>Service</th><th>Category</th><th>Price</th><th>Duration</th><th>Popular</th><th></th></tr></thead>
      <tbody>${list.map(s => `
        <tr>
          <td><div class="cell-user"><span style="font-size:1.5rem;">${s.icon}</span><div><div class="t-strong">${s.name}</div><div class="small muted">${s.includes.length} inclusions</div></div></div></td>
          <td><span class="badge badge-muted">${s.category}</span></td>
          <td class="t-strong">${App.money(s.price)}</td>
          <td>${s.duration} min</td>
          <td>${s.popular ? '<span class="badge badge-info">⭐ Popular</span>' : '<span class="muted small">—</span>'}</td>
          <td class="t-actions">
            <button class="btn btn-ghost btn-sm" onclick="editService('${s.id}')">Edit</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="removeService('${s.id}')">Delete</button>
          </td>
        </tr>`).join('')}</tbody>
    </table></div></div>`;
}

function editService(id) {
  const s = id ? DB.service(id) : { name:'', category:'Exterior', price:'', duration:'', desc:'', icon:'🚿', popular:false, includes:[] };
  App.modal(`
    <div class="modal-head"><h3>${id ? 'Edit' : 'Add'} service</h3><button class="modal-close" onclick="App.closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field"><label>Service name</label><input class="input" id="sName" value="${s.name}" placeholder="Premium Foam Wash"></div>
        <div class="field"><label>Icon (emoji)</label><input class="input" id="sIcon" value="${s.icon}" placeholder="🫧"></div>
      </div>
      <div class="form-grid">
        <div class="field"><label>Category</label><select class="select" id="sCat">${['Exterior','Interior','Premium'].map(c=>`<option ${s.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div class="field"><label>Price (₹)</label><input class="input" type="number" id="sPrice" value="${s.price}" placeholder="499"></div>
      </div>
      <div class="form-grid">
        <div class="field"><label>Duration (min)</label><input class="input" type="number" id="sDur" value="${s.duration}" placeholder="40"></div>
        <div class="field"><label>Mark as popular</label><select class="select" id="sPop"><option value="false" ${!s.popular?'selected':''}>No</option><option value="true" ${s.popular?'selected':''}>Yes</option></select></div>
      </div>
      <div class="field"><label>Description</label><textarea class="textarea" id="sDesc" placeholder="Short description…">${s.desc}</textarea></div>
      <div class="field"><label>Inclusions (one per line)</label><textarea class="textarea" id="sInc" placeholder="Snow foam pre-wash&#10;Two-bucket hand wash">${s.includes.join('\n')}</textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="App.closeModal()">Cancel</button>
      <button class="btn" onclick="saveService('${id || ''}')">${id ? 'Save changes' : 'Create service'}</button>
    </div>`);
}
function saveService(id) {
  const patch = {
    name: gv('sName')||'New Service', icon: gv('sIcon')||'🚿', category: gv('sCat'),
    price: +gv('sPrice')||0, duration: +gv('sDur')||30, desc: gv('sDesc')||'',
    popular: gv('sPop')==='true', includes: gv('sInc').split('\n').map(x=>x.trim()).filter(Boolean)
  };
  if (id) DB.updateService(id, patch); else DB.addService(patch);
  App.closeModal(); App.toast(id ? 'Service updated' : 'Service created', 'success'); render();
}
function removeService(id) {
  App.confirm('Delete service?', 'This service will be permanently removed.', () => {
    DB.deleteService(id); App.toast('Service deleted', 'info'); render();
  }, 'Delete', true);
}
function gv(id){return document.getElementById(id).value.trim();}
render();
</script>
</body>
</html>
