<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payments — Admin — AquaShine</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<div id="app-root"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
const root = App.shell({ role: 'admin', active: 'payments', title: 'Payment Management' });
let filter = 'All';

function render() {
  const all = DB.all().adminPayments;
  const list = filter === 'All' ? all : all.filter(p => p.status === filter);
  const success = all.filter(p=>p.status==='Success');
  const revenue = success.reduce((s,p)=>s+p.amount,0);
  const pending = all.filter(p=>p.status==='Pending').reduce((s,p)=>s+p.amount,0);
  const refunded = all.filter(p=>p.status==='Refunded').reduce((s,p)=>s+p.amount,0);
  const tabs = ['All','Success','Pending','Refunded'];
  const methodIcon = { 'UPI':'📱','Credit Card':'💳','Debit Card':'🏦','Net Banking':'🌐' };
  root.innerHTML = `
    <div class="page-head"><h1>Payment Management</h1><p>Track transactions, revenue and refunds.</p></div>
    <div class="stats-grid mb-3">
      <div class="stat"><div class="st-ic green">💰</div><div class="st-val">${App.money(revenue)}</div><div class="st-label">Total Revenue</div></div>
      <div class="stat"><div class="st-ic amber">⏳</div><div class="st-val">${App.money(pending)}</div><div class="st-label">Pending</div></div>
      <div class="stat"><div class="st-ic red">🔁</div><div class="st-val">${App.money(refunded)}</div><div class="st-label">Refunded</div></div>
      <div class="stat"><div class="st-ic blue">🧾</div><div class="st-val">${all.length}</div><div class="st-label">Transactions</div></div>
    </div>
    <div class="between mb-3">
      <div class="toolbar">${tabs.map(t => `<button class="btn ${t===filter?'':'btn-outline'} btn-sm" onclick="setFilter('${t}')">${t}</button>`).join('')}</div>
      <button class="btn" onclick="App.toast('Demo: export transactions','info')">⬇️ Export</button>
    </div>
    <div class="card"><div class="table-wrap"><table class="data">
      <thead><tr><th>Transaction</th><th>Customer</th><th>Booking</th><th>Method</th><th>Date</th><th>Amount</th><th>Status</th><th></th></tr></thead>
      <tbody>${list.map(p => `
        <tr>
          <td class="t-strong">${p.id}</td>
          <td><div class="cell-user"><span class="mini-avatar">${App.initials(p.customer)}</span>${p.customer}</div></td>
          <td>${p.booking}</td>
          <td>${methodIcon[p.method]||'💳'} ${p.method}</td>
          <td>${App.date(p.date)}</td>
          <td class="t-strong">${App.money(p.amount)}</td>
          <td>${App.statusBadge(p.status)}</td>
          <td>${p.status==='Success' ? `<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="refund('${p.id}')">Refund</button>` : '<span class="small muted">—</span>'}</td>
        </tr>`).join('')}</tbody>
    </table></div></div>`;
}
function setFilter(f){filter=f;render();}
function refund(id) {
  App.confirm('Issue refund?', 'This will mark the transaction as refunded.', () => {
    const d = DB.all();
    d.adminPayments.find(p => p.id === id).status = 'Refunded';
    DB.save(d); App.toast('Refund issued', 'info'); render();
  }, 'Issue refund', true);
}
render();
</script>
</body>
</html>
