<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — Admin — AquaShine</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
<div id="app-root"></div>

<script src="../assets/js/data.js"></script>
<script src="../assets/js/app.js"></script>
<script>
const root = App.shell({ role: 'admin', active: 'reports', title: 'Reports & Analytics' });

const monthly = [{m:'Feb',v:82000},{m:'Mar',v:95000},{m:'Apr',v:88000},{m:'May',v:112000},{m:'Jun',v:134000},{m:'Jul',v:98000}];
const maxM = Math.max(...monthly.map(x=>x.v));
const svcRev = [
  {n:'Full Detailing',v:42,c:'#0ea5e9'},
  {n:'Ceramic Coating',v:24,c:'#06b6d4'},
  {n:'Premium Foam',v:18,c:'#7c3aed'},
  {n:'Interior Clean',v:10,c:'#16a34a'},
  {n:'Express Wash',v:6,c:'#f59e0b'}
];

root.innerHTML = `
  <div class="between mb-3">
    <div class="page-head" style="margin:0;"><h1>Reports & Analytics</h1><p>Business insights across bookings, revenue, services and customers.</p></div>
    <div class="toolbar">
      <select class="select" style="width:auto;"><option>Last 6 months</option><option>This year</option><option>Last 30 days</option></select>
      <button class="btn" onclick="App.toast('Demo: report exported as PDF','success')">⬇️ Export report</button>
    </div>
  </div>

  <div class="stats-grid mb-3">
    <div class="stat"><div class="st-ic green">💰</div><div class="st-val">₹6.09L</div><div class="st-label">Total Revenue (6mo)</div><div class="st-trend up">▲ 18.2%</div></div>
    <div class="stat"><div class="st-ic blue">🗓️</div><div class="st-val">1,284</div><div class="st-label">Bookings</div><div class="st-trend up">▲ 9.6%</div></div>
    <div class="stat"><div class="st-ic purple">👥</div><div class="st-val">642</div><div class="st-label">Active Customers</div><div class="st-trend up">▲ 12.1%</div></div>
    <div class="stat"><div class="st-ic cyan">📊</div><div class="st-val">₹474</div><div class="st-label">Avg. Order Value</div><div class="st-trend up">▲ 4.3%</div></div>
  </div>

  <div class="grid-2 mb-3">
    <div class="card card-pad">
      <div class="section-head"><h2>Monthly revenue</h2><span class="badge badge-success">Trending up</span></div>
      <div class="chart">
        ${monthly.map(x => `<div class="col"><div class="c-val">₹${(x.v/1000).toFixed(0)}k</div><div class="bar" style="height:${x.v/maxM*100}%"></div><div class="c-label">${x.m}</div></div>`).join('')}
      </div>
    </div>
    <div class="card card-pad">
      <h2 style="font-size:1.15rem;margin-bottom:16px;">Revenue by service</h2>
      <div class="legend">
        ${svcRev.map(s => `<div class="lg-item"><span class="sw" style="background:${s.c}"></span>${s.n}<span class="lg-val">${s.v}%</span></div>
          <div class="progress" style="margin-bottom:8px;"><div class="bar" style="width:${s.v*2.2}%;background:${s.c}"></div></div>`).join('')}
      </div>
    </div>
  </div>

  <div class="row">
    <div class="card card-pad grow" style="min-width:280px;">
      <h2 style="font-size:1.1rem;margin-bottom:14px;">📄 Available reports</h2>
      ${[
        ['Customer Report','Signups, retention & lifetime value','👥'],
        ['Booking Report','Volumes, slots & cancellation trends','🗓️'],
        ['Payment Report','Revenue, refunds & method breakdown','💳'],
        ['Service Report','Popularity & performance by service','🧴']
      ].map(([t,d,ic]) => `
        <div class="between" style="padding:12px 0;border-bottom:1px solid var(--border);">
          <div style="display:flex;gap:12px;align-items:center;"><span style="font-size:1.4rem;">${ic}</span><div><div class="t-strong">${t}</div><div class="small muted">${d}</div></div></div>
          <button class="btn btn-outline btn-sm" onclick="App.toast('Demo: generating ${t}…','info')">Generate</button>
        </div>`).join('')}
    </div>
    <div class="card card-pad grow" style="min-width:280px;">
      <h2 style="font-size:1.1rem;margin-bottom:14px;">🏆 Top customers</h2>
      ${DB.all().allCustomers.slice().sort((a,b)=>b.spent-a.spent).slice(0,5).map((c,i) => `
        <div class="between" style="padding:11px 0;border-bottom:1px solid var(--border);">
          <div class="cell-user"><span class="mini-avatar">${App.initials(c.name)}</span><div><div class="t-strong">${c.name}</div><div class="small muted">${c.bookings} bookings</div></div></div>
          <div style="text-align:right;"><div class="t-strong">${App.money(c.spent)}</div>${i===0?'<span class="badge badge-info">👑 Top</span>':''}</div>
        </div>`).join('')}
    </div>
  </div>`;
</script>
</body>
</html>
